name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - working-directory: "Calender App"
        run: npm install
      - working-directory: "Calender App"
        run: npm run make
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: "Calender App/out/make/**/*"

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - working-directory: "Calender App"
        run: npm install
      - working-directory: "Calender App"
        run: npm run make
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: "Calender App/out/make/**/*"
